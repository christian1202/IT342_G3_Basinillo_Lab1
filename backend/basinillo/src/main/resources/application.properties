# ==========================================
# MAIN CONFIGURATION
# ==========================================
spring.application.name=portkey

# 1. IMPORT LOCAL SECRETS
# This looks for the secret file. If it exists, it overrides the defaults below.
spring.config.import=optional:classpath:application-secret.properties

# 2. OPTIMIZED CONNECTION POOLING (For Neon Free Tier)
# Neon Free Tier has limited connections, so we keep the pool small.
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.idle-timeout=600000

# 3. JPA / HIBERNATE SETTINGS
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 4. ENVIRONMENT INTELLIGENCE
# If ${DATABASE_URL} is found (on Railway), use it. 
# Otherwise, it falls back to whatever is in application-secret.properties.
spring.datasource.url=jdbc:${DATABASE_URL}
spring.datasource.username=${PGUSER:}
spring.datasource.password=${PGPASSWORD:}


#WEBHOOK CONFIGURATION
# Clerk webhook configuration
clerk.webhook.secret=${CLERK_WEBHOOK_SECRET:}