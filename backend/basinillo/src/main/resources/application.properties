# ==========================================
# MAIN CONFIGURATION
# ==========================================
spring.application.name=portkey
server.port=${PORT:8080}

# Import secret config (LOCAL ONLY - Must be in .gitignore)
spring.config.import=optional:classpath:application-secret.properties

# ==========================================
# DATABASE (Environment Intelligence)
# ==========================================
spring.datasource.url=${DATABASE_URL:}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Pool (Optimized for Neon Free Tier)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# CLOUDFLARE R2 CONFIGURATION
# ==========================================
r2.account-id=${R2_ACCOUNT_ID:}
r2.access-key=${R2_ACCESS_KEY_ID:}
r2.secret-key=${R2_SECRET_ACCESS_KEY:}
r2.bucket=${R2_BUCKET_NAME:portkey-documents}
r2.endpoint=https://${r2.account-id}.r2.cloudflarestorage.com

# ==========================================
# JWT AUTHENTICATION
# ==========================================
jwt.secret=${JWT_SECRET:}
jwt.access-token-expiration-ms=3600000
jwt.refresh-token-expiration-ms=604800000

# ==========================================
# CORS
# ==========================================
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,https://portkey.vercel.app}