# ==========================================
# MAIN CONFIGURATION
# ==========================================
spring.application.name=portkey

# 1. IMPORT LOCAL SECRETS
# This looks for the secret file. If it exists, it overrides the defaults below.
spring.config.import=optional:classpath:application-secret.properties

# 2. OPTIMIZED CONNECTION POOLING (For Neon Free Tier)
# Neon Free Tier has limited connections, so we keep the pool small.
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.idle-timeout=600000

# 3. JPA / HIBERNATE SETTINGS
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 4. ENVIRONMENT INTELLIGENCE
# If ${DATABASE_URL} is found (on Railway), use it. 
# Otherwise, it falls back to whatever is in application-secret.properties.
spring.datasource.url=jdbc:${DATABASE_URL}
spring.datasource.username=${PGUSER:}
spring.datasource.password=${PGPASSWORD:}

# WEBHOOK CONFIGURATION
# Clerk webhook configuration
clerk.webhook.secret=${CLERK_WEBHOOK_SECRET:}
clerk.jwks-uri=${CLERK_JWKS_URI}
clerk.secret-key=${CLERK_SECRET_KEY:}

# ==========================================
# CLOUDFLARE R2 CONFIGURATION (ENVIRONMENT INTELLIGENCE)
# Maps Railway variables to Spring Boot properties
# ==========================================
r2.access-key=${R2_ACCESS_KEY_ID:}
r2.secret-key=${R2_SECRET_ACCESS_KEY:}
r2.account-id=${R2_ACCOUNT_ID:}
r2.bucket=${R2_BUCKET_NAME:portkey-documents}

# We dynamically build the endpoint URL using your Account ID
r2.endpoint=https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com